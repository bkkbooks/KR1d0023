body:
  text: 周官祿田考卷上吳江沈彤撰官之命者必有禄祿必稱其爵而量給於公田是周官法制之大端其等與數之相當在當時固彰彰可考也自司祿籍亡先後鄭註内史專取諸王制而本經之祿秩以晦迨歐陽氏發官多田寡祿將不給之疑後之傳㑹者且踵為誣謗即信周官者亦未得二者之等數而此制幾無從復顯余嘗研求本經旁覽傳記得其端於載師之都邑以為有義例可推確徵可佐凡内外官之祿皆可得辨析整齊之而前人之繆妄皆可得而破之㑹吾友徐君靈胎撰經濟策舉此相訪余為一陳梗槩靈胎謂曷不著書以盡闡其制乃遂攄曩時所得為官爵數公田數祿田數三篇復為問答於每篇之後反覆委蛇以明其所以定是數之故而總名曰周官禄田考夫自宋以來之稽官有未及鄉遂屬吏者今乃并郊野之吏而補之其稽田有不去山林川澤城郭等三之一者今更通不易一易再易上中下之率而二夫當一夫則官益多而田益寡宜祿之不給尤甚也然以縣都已下數等之田食公卿大夫士數等之爵非獨相當且供他法用而有餘是田禄與官爵之數在本經曷嘗牴牾乃晦蝕且二千年而莫之開闡何也凡定公田之數以井數定祿之數以其等定爵之數以序官而定爵之等以命數定祿之等以爵等亦以命數云官爵數周天子制官之祿皆以爵為差於其内外諸侯官亦如之故欲知周官之祿數必先考周官之爵數而欲并知内外諸侯官之禄亦必先考其官之爵周天子具六官官之爵六等曰公曰孤卿曰中大夫下大夫曰上士曰中士曰下士庶人在官者屬焉后宫婦官之爵亦六等女給事屬焉凡天子之官之爵其有常數可周知而見本經及註者公三人孤三人卿五官官一人冬官亡例推於後雖數定者不計又地官鄉大夫毎鄉卿一人六鄉則六人凡十一人中大夫天官四人地官五人又州長每州一人三十州則三十人遂大夫毎遂一人六遂則六人春官五人夏官十四人秋官四人凡六十八人下大夫天官十二人地官十五人又黨正每黨一人百五十黨則百五十人縣正每縣一人三十縣則三十人春官二十四人其世婦下大夫見後餘並同夏官三十人秋官八人凡二百六十九人上士天官四十六人地官四十八人又族師每族一人七百五十族則七百五十人鄙師每鄙一人百五十鄙則百五十人春官五十三人夏官六十七人又僕夫十人序官文故闕今考補秋官二十人又象胥每翟一人六翟則六人凡千一百五十人中士天官百一十八人地官百四十八人又閭胥每閭一人三千閭則三千人酇長每酇一人七百五十酇則七百五十人春官百五十八人夏官百五十八人秋官百五十二人又象胥每翟二人六翟則十二人凡四千四百九十六人下士天官百七十九人又寺人五人故闕其爵今考入此地官二百七十二人又比長五家一人萬五千比則萬五千人里宰每里一人三千里則三千人司門每門二人王城十二門則二十四人司闗每闗二人王畿十二闗則二十四人場人每場二人九穀九場則十八人春官二百七十五人夏官二百四十三人又馭夫二人故闕此數今考補趣馬百九十二人如校人職駑馬三良馬之誤二為三則百九十八人今考正廋人每閑二人天子十二閑則二十四人秋官百九十三人又條狼氏八人故為六人今考正象胥每翟八人六翟則四十八人凡萬九千五百有七人其不見經註而數皆可推者上士為郊之縣正十一縣則十一人中士為郊之鄙師野之縣正郊五十五鄙野九百五十三縣人各如縣鄙之數凡千有个人下士為郊之酇長野之鄙師郊二百七十四酇野四千七百六十五鄙人各如鄙酇之數凡五千有三十九人通計三萬一千五百六十五人其庶人在官者府天官八十五人地官七十九人又司門每門一人十二門則十二人司闗每闗一人十二闗則十二人場人每場一人九場則九人春官百一十二人夏官七十六人秋官七十人凡四百五十五人史天官百四十八人地官百七十一人又司門每門二人則二十四人司關每闗二人則二十四人場人每場一人九場則九人春官二百七十一人凡五官人數諸刊本或互異今定從明嘉靖間重刋宋本每卷末記經註字數者惟春官占人之史宜與龜人簭人諸官同二人而誤作一人則别從明國子監及葛鼒本故其史共二百七十一人至諸本皆誤而今考正者則各註本官下云夏官百八十一人又廋人每閑二人十二閑則二十四人秋官百五十九人凡千有一十一人胥天官百七十四人地官二百有二人春官百六十六人夏官二百四十五人秋官百五十九人又條狼氏八人故為六人今考正凡九百五十四人徒天官二千二百有四人地官二千五百三十二人又司門每門四人則四十八人司闗每闗四人則四十八人場人每場二十人則百八十人春官千八百四十人夏官千九百四十八人又廋人每閑二十人則二百四十人又趣馬千有八人圉師千五百一十二人如校人誤字趣馬千一百五十二人圉師千七百二十八人今考正秋官千九百九十八人又條狼氏八十人故為六人今考正象胥每翟二十人六翟則百二十人又掌客二十人故為三十人今考正凡萬三千七百七十八人非府史胥徒而相類者天官賈四十四人奄二十五人工二十二人又閽人二十八人故無此數今考定内豎十人地官賈八人奄十二人春官奄八人瞽矇三百人眂瞭三百人韎師舞者十六人工百有四人夏官賈八人虎士八百人狂夫四人工四人馬醫四人又圉師六百一十二人圉人二千五百九十二人如校人誤字圉師六百四十八人圉人二千八百有八人今考正秋官賈四人又罪隷百二十人蠻隷百二十人閩隷百二十人夷隷百二十人貉隷百二十人凡五千五百有五人通計二萬一千七百有三人其后宫婦官之爵夫人視公三人嬪視孤卿九人春官世婦每宫卿二人視中大夫后六宫凡十二人見賈氏公彦疏下大夫每宫四人凡二十四人天官女祝四人女史八人皆視上士凡十二人春官世婦每宫中士八人凡四十八人天官内司服女御四人故為二人今考正縫人女御八人皆視下士凡十二人通計百二十人其給事之女府及史春官世婦每宫女府二人凡十二人女史二人凡十二人天官女酒三十人女漿十五人女籩十人女醢二十人女醯二十人女鹽二十人女幂十人女工八十人地官女舂扰二人女饎八人又女稾每奄二人稾人八奄則女稾十六人春官女祧每廟二人天子七廟通姜嫄為八廟見疏則十六人皆類於胥凡二百四十七人天官奚六百七十二人地官奚四十五人又女稾每奄奚五人則四十人春官守祧每廟奚四人則三十二人世婦每宫奚十六人則九十六人皆類於徒凡八百八十五人通計千一百五十六人其見於經而不可周知其數者五官之屬十一上士都司馬二人家司馬二人家司馬故無數今考補餘並同朝大夫二人中士山虞四人澤虞八人都司馬四人家司馬四人都則一人都士二人家士二人下士山虞十六人林衡二十人川衡二十人澤虞三十二人都司馬八人家司馬八人朝大夫四人都則二人都士四人家士四人庶人在官者山虞百八十三人林衡二百二十五人川衡二百二十五人澤虞三百六十六人都司馬九十八人家司馬九十八人朝大夫三十一人都則八十七人都士五十人家士五十人司市下胥師一人賈師一人史四人司虣二人司稽四人胥十人肆長二十人皆每官人數其凡無考其官本無爵數亦無常者春官之屬四男巫女巫凡以神仕者故以仕為士王氏應電周禮傳云按其職當作仕今從之旄人舞者其爵有常數而闕者冬官是也然以五官爵數之可周知者去其婦官去其公孤及鄉遂郊野官鄉遂官二萬二千八百七十二人郊野官六千有五十八人存二千六百二十九人而五分取一以例冬官之有爵者約五百二十餘人以五官在官庶人數之可周知者而五分取一以例其在冬官者約四千三百四十人并五官所可周知之數凡五萬九千四百餘人此天子外内官爵及凡在官者大總數之略也若内諸侯之官之爵由經註及他傳記所見推之則在公四等自卿而下在孤卿三等自大夫而下在大夫二等自上士而下其數公之卿二人下大夫五人上下士各若千人孤卿之大夫二人上士五人下士若千人大夫之上士二人下士五人其縣鄙之士皆上士為縣正下士為鄙師公七縣三十三鄙孤卿二縣八鄙大夫二鄙上下士皆各如縣鄙之數通計爵數之可知者在公四十七人在孤卿十七人在大夫九人其王子弟之官之爵在親者如公在次疏者如孤卿在更疏者如大夫若外諸侯之官之爵則在上公六等自孤而下在侯伯五等在子男四等皆自卿而下其數公之孤一人卿三人下大夫五人上士二十七人中下士各若干人侯伯之卿大夫士如之子男之卿大夫亦如之士則上二十七人下若干人無中此皆見於經註及他傳記其無所見而可推知者上公為大國三鄉三遂卿鄉大夫三人下大夫州長十五人遂大夫三人凡十八人上士黨正七十五人縣正十五人凡九十人中士族師三百七十五人鄙師七十五人凡四百五十人下士閭胥千五百人酇長三百七十五人凡千八百七十五人其野二百二十六縣千一百三十鄙中士為縣正下士為鄙師皆各如縣鄙之數侯伯為次國二鄉二遂卿鄉大夫二人下大夫州長十人遂大夫二人凡十二人上士黨正五十人縣正十人凡六十人中士族師二百五十人鄙師五十人凡三百人下士閭胥千人酇長二百五十人凡千二百五十人其野侯百四十四縣七百一十九鄙伯七十二縣三百六十一鄙皆中士為縣正下士為鄙師各如其縣鄙之數子男為小國一鄉一遂卿鄉大夫一人下大夫州長五人遂大夫一人凡六人上士黨正二十五人縣正五人凡三十人下士族師百二十五人鄙師二十五人凡百五十人其野子三十一縣百五十五鄙上士為縣正下士為鄙師皆各如縣鄙之數男一鄙下士為鄙師如其數通計爵數之可知者在上公三千八百二十八人在侯二千五百二十二人在伯二千有九十二人在子四百有八人在男二百二十三人其他有爵官及婦官及在官庶人女給事之在内外侯者數皆無考周官之爵曰公曰孤曰卿曰中大夫曰下大夫曰上士曰中士曰下士凡八等而合孤卿為一等中下大夫為一等何也曰典命職云王之三公八命其卿六命不别言三孤命數則并孤於卿矣云其大夫四命則大夫不以中下殊矣爵與命之等常相因如上公特置孤於卿上而孤四命卿三命則命又因爵而殊矣故二者皆合為一等也且考工記稱九卿鄭康成以六卿三孤註之則孤亦名卿而為一等孟子王制序大夫皆止一等是又不分二等之明徵也經何以無上大夫也曰上大夫即孤卿也大戴禮記盛徳篇云三少皆上大夫也漢書賈誼傳亦云三少謂三孤王制云諸侯之上大夫卿天子亦然地官鄉老二鄉公一人註以為三公兼之而鄉大夫每鄉卿一人則不以六卿兼何也曰鄉老無專職惟及鄉大夫帥其吏而禮賔賢能以獻其書於王退而以鄉射之禮五物詢衆庶而已故三公可兼若鄉大夫則職專而所掌多故别置而不以六卿兼也如或兼之亦與公之兼鄉老常暫殊矣僕夫之列於上士何曰按校人職僕夫領馭夫馭夫領趣馬註云趣馬下士馭夫中士則僕夫上士也寺人之列於下士何曰酒人之奄掌祭祀役於世婦疏以府史當之寺人佐世婦治禮事尊於酒人之奄則爵當為士内小臣爵上士后以下事無不掌而在后者為多寺人所掌多在内人及女宫而兼佐世婦其職卑於内小臣非止一等則不為中士而為下士明矣趣馬之定為百九十二人何也曰校人云良馬三乗為皁皁一趣馬駑馬三良馬之數八麗一師八師一趣馬註云八皆宜為六字之誤也麗耦也二耦為乘良馬一種四百三十二匹五種合二千一百六十匹駑馬千二百九十六匹今按三良馬之三宜為二駑馬止八百六十四匹耳良馬二千一百六十匹為皁百八十當趣馬百八十人駑馬八百六十四匹為師七十二當趣馬十二人并之為百九十二人也馭夫之下士二人何以補也曰良馬三皁為繫繫一馭夫則百八十皁為六十繫當六十馭夫序官中士二十人下士四十人數正相合駑馬六趣馬一馭夫則十二趣馬當亦有二下士為馭夫也僕夫之補何以十人也曰六繫為廐廐一僕夫六繫者二百一十六匹也良馬合二千一百六十匹當為十廐故十僕夫也駑馬無僕夫孰掌其廐曰駑馬卑當即馭夫掌之也駑馬之廐幾何曰六廐成校校有左右兩校凡十二廐良馬既為十廐則駑馬當二廐也以千二百九十六匹為二廐可乎曰駑馬四百三十二匹而一馭夫經有定數兩馭夫掌二廐當八百六十四匹不得增多愚所以必破三為二也良馬乘一師四圉二千一百六十匹為五百四十乘當五百四十師二千一百六十圉駑馬麗一圉六麗一師八百六十四匹為四百三十二麗當七十二師四百三十二圉故圉師凡六百一十二圉人凡二千五百九十二亦以駑馬二良馬之法定數也然則定趣馬圉師之徒數亦如之乎曰然趣馬之徒皁四人良馬百八十趣馬當七百二十徒駑馬十二趣馬一趣馬六皁則有七十二皁當二百八十八徒故并之為千有八徒圉師之徒乘二人良馬五百四十乘當千有八十徒駑馬四百三十二麗為二百一十六乘當四百三十二徒故并之為千五百一十二徒也何以知一趣馬六皁也曰十二匹為皁駑馬與良馬同六師一趣馬惟駑馬則然六師為七十二匹故一趣馬六皁也序官趣馬於駑馬官徒蓋皆略之條狼氏下士及胥徒之數何以皆破六為八也曰其職云王出入則八人夾道公則六人此下士屬王當八人也下士之夾道者八則隨而條狼之胥亦當八胥為什長胥八則徒當八十也郊野之設官何以知之曰小司徒見四郊之吏遂大夫見凡為邑者縣師見都鄙稍甸郊里之羣吏固厯有明文也且使鄉遂之外而無官則畿疆以内教多不逮聖人之所以擾萬民者豈若是其疎哉何以知郊之官為縣正鄙師酇長而爵為上中下士野之官為縣正鄙師而爵為中下士也曰遂之法計家以為縣鄙而郊野如之則即其縣鄙以設官亦如遂至官之爵等則遞降於遂也何以知郊野之亦為縣鄙也曰司常云州里建旟縣鄙建旐大司馬云鄉遂載物郊野載旐州里即鄉遂也於鄉舉大於遂舉細説見方氏苞周官析疑大謂州細謂里郊野即縣鄙也大司馬舉其地司常舉其家皆互相備也且縣鄙對州里而言則不在六遂之中而在郊野明矣郊野對鄉遂而言則在鄉遂之外而為縣鄙又明矣其縣鄙而亦計家以為也若之何曰王畿百同私田當五百一十二萬夫通不易一易再易三等之率而家受二夫當二百五十六萬家則一同當二萬五千六百家詳中卷郊地四同當十萬二千四百家以七萬五千家為六鄉餘二萬七千四百家以二萬五千家為十縣中含鄙五十酇二百五十餘二千四百家以二千家為四鄙中含酇二十餘四百家以為四酇四酇當亦為一鄙并四鄙當亦為一縣則為縣十一鄙五十五酇二百七十四也野有甸稍縣畺四等地甸十二同當三十萬七千二百家以七萬五千家為六遂餘當二十三萬二千二百家稍二十同當五十一萬二千家縣二十八同當七十一萬六千八百家畺三十六同當九十二萬一千六百家漢書地理志云初雒邑與宗周通封畿東西長而南北短短長相覆為千里則分郊甸稍縣畺為大小五周雖算法歸於整齊要亦隨地勢短長相覆也去六遂家數存二百三十八萬二千六百家則為縣九百五十三中含四千七百六十五鄙也若其家而各有増減則縣鄙亦從而増減焉此所列者皆經傳舉中法也凡公邑皆稱縣鄙詳析疑司常大司馬二職稍縣畺有都家則不知郊甸之皆為公邑而亦專計其縣鄙何也曰縣鄙者都家之所居也本大宰及大司徒註故經於采邑必兼都鄙稱之且都家無定數而縣鄙有常計縣鄙則於官爵之多少考稽尤便也何以知郊野官之爵等遞降於遂也曰野與郊之差猶鄉遂也鄉遂制同而鄉内遂外則遂官之爵降鄉官一等故知郊野制同而郊内野外則野之官之爵亦降郊之官一等也至郊在遂内為六鄉餘地而官之爵反降於遂者乃因郊之家亦以縣鄙名為六遂屬别之餘其地等之降固殊常也然則遂人造縣鄙形體之法何在野而不在郊也曰野對郊為甸稍縣畺獨舉則或兼郊或兼郊與鄉遂人治野之溝塗兼郊而復兼鄉也經田野而造縣鄙不兼鄉而已兼郊也析疑云曰治野以作溝洫畛涂言曰凡治野曰以達於畿明自鄉郊至縣畺皆用此以治也又云鄉師以嵗時巡國及野而賙萬民之囏阨鄉大夫之職野自六尺以及六十有五皆征之則城郭之外通謂之野明矣則名郊之家為縣鄙也又何疑曰郊之家必不以州黨名何也曰郊之家而以州黨名必其地止降於鄉尚等於遂而野之降於遂亦止一等則其官之爵遞高其祿亦遞増較今所考之祿田當益十萬五千餘夫是盡所餘之公田給之而不足矣他法用其何以供故不得不以縣鄙名而降於遂也蓋量公田之入以定其制也郊之官自里宰而下野之官自酇長而下曷不并計其數而列之曰是皆官之無爵者無爵則無祿與遂之鄰長同非考祿所須也至序官之無郊野官文脱耳否則即遂官為例而省也掌客之徒三十而破為二十何也曰胥為什長胥一則徒十胥十則徒百五官自玉府而外無不然者掌客之胥二則徒當二十也且掌客與掌訝其事相承掌客之府史胥皆半於掌訝徒亦當半之矣玉府四胥而徒乃四十八何也曰必十徒不足供一胥之科次故浮於常也五官之有徒而無胥者何曰殆其事易供而無庸有才智者率之耳工賈奄以下之列於庶人在官者何也曰不為有爵之士則皆在官之庶人矣其類府史胥徒也可别而言之乎曰工賈序官多列胥上或無胥而但有工賈則類胥也奄不稱士而領其官則類府也閽人内豎按其職則類胥若徒也瞽矇分上中下眂瞭為相亦如之二職相近而並列府史胥上則上瞽與其相類府中瞽與其相類史下瞽與其相類胥也韎師舞者列史下徒上則類胥也虎士列胥下則類徒也狂夫掌帥百隷當在徒上其等未詳馬醫列府上則類府也圉師下有徒則類胥也圉人役於圉師則類徒也五隷皆為役則亦類徒也又胥師賈師下各有二史則類府也司虣司稽列史下胥上按其職則類胥也肆長列胥下則類徒也朝大夫都則之史下徒上各有庶子則皆類胥也胥師賈師至此皆不可周知其數者五隷之守王宮野舎諸役者固自為隷也其役於百官府及校人掌畜牧人服不氏者當即為諸徒及圉人而類徒中復計之不慮計食之重疊乎曰無可考而别不得不復計之然人不多而稍食寡於㑹計之大數重疊亦無幾耳大僕有所云御庶子者何也曰此即宮伯所掌王宮之庶子而直事路鼓所者非朝大夫都則二庶子之比也詳朝大夫疏閽人之為二十八何以定之曰序官云王宮每門四人囿游亦如之宫門臯庫雉應路凡五當二十人囿游之門蓋二又當八人也閽人掌守王宮之中門之禁註以雉門為中門則是專守雉門與序官云每門異何也曰疏云彼言中門據有禁守者言之其實王之五門皆有守者是也何以知囿游之門為二也曰觀囿人掌囿游之守禁是游即在囿中而蒙上每門四人之文殆各有當守之門一矣世婦卿之視中大夫何也曰王之九卿六命十二小卿皆中大夫四命九嬪視九卿此卿十二人則當視四命中大夫也天官之世婦即春官之世婦乎曰然其職同故其人同也但兩著其職而爵數獨詳於春官則未之歸一耳朱子以周禮為草本蓋謂此類也女祝女史之視上士何也曰女祝所掌略如王之大祝女史所掌略如王之大史女史云凡后之事以禮從註云亦如大史之從於王餘詳周禮訂義黄氏度說大祝大史之長為下大夫次則上士后官事小故女祝女史視上士也内司服縫人之女御何以視下士也曰領之以無爵之奄宜不得視士名之以女御則御叙於王所者尤不得視府史也經之不著其為上士下士何也曰其數少不得如外官之於中士上半而下倍則變其例也内司服女御之數何破二為四也曰考女御之凡當七十二人固不可少此二人女祝女史十二人中士四十八人内司服縫人十二人而内司服之女御於王后九嬪外内命婦之服無不掌則二人亦不足也何以知世婦之中士為女御也曰女御者九御之屬也九御者世婦之卿大夫也世婦之卿大夫為九御則世婦之中士為女御明矣且安知春官世婦中士八人上不元有女御每宮四字也女御為九御之屬九御為世婦之卿大夫其有徵乎曰内宰之教九御在教九嬪之下九嬪則掌教九御而二經别無教世婦之文則九御非世婦歟世婦之卿十二人下大夫二十四人并為三十六人則為九御者四九御非世婦之卿大夫歟九嬪教九御各帥其屬而以時御叙於王所則九御所各帥者女御也女御非九御之屬歟何以知女祝女史之為女御也曰上蒙女御之文也苟非女御則七十二人而少十二人尤不可也女御之必為七十二人何也曰七十二人則其數八九得倍於世婦之卿大夫為其屬乃足也且合夫人嬪婦而計之於王妃百二十之總數仍無闕也世婦女御之數與昏義所云二十七世婦八十一御妻者不合何也曰此周制也昏義所云夏制也故各與其外官之數相當也周六卿之屬中大夫十二人下大夫二十四人與世婦卿大夫之數適相當惟上士以下參差耳康成以昏義註周官誤也婦官而以卿大夫士名之何也曰白虎通云卿之言章夫之言扶士之言事婦人有是徳則亦以是爵爵之也内宗外宗之不列何也曰其人皆因事而至非專官雖有爵而無祿也女酒女籩等之類胥奚之類徒何也曰按註疏胥有才智為什長徒給使役夫女能曉解酒漿等事則有才智矣女酒三十人而奚三百人則一女酒為十奚之長矣女籩十人而奚二十人則一女籩亦為二奚之長故女酒之等類胥奚止堪給使役故類徒也若寺人之職有内人及女宮何也曰内人謂女酒女籩之等而上及女府女史也女宮謂奚也然則註以内人為女御非歟曰女御與九嬪世婦皆為内命婦内宰註已言之且閽人於外内命婦出入為之辟而内人之出入無帥則幾是又其下於内命婦之徵本姜氏兆錫周禮輯義内宰職尚安得以内人為女御也女府史在女御之下不為女御則為女府史而或類胥矣女宫之為奚何以知之曰女宮為刑女之在宫中者見於寺人註而序官酒人奚在女酒下註以奚為宦女禁暴氏奚與隷並稱註以奚為女奴女奴即司厲入舂稾之女子此盜賊之帑從坐者舂槀在宫中宦女即掌戮守内之宮者司刑宫罪註兼宦男女則此宮者亦不當專指宦男是二者即在宫刑女故知女宮為奚也家司馬之上中下士在官庶人何以補也曰以序官家司馬各使其臣以正於公司馬之文移在都司馬職後都司馬職後家司馬亦如之之文移在序官都司馬後是家司馬亦如之即謂每家上中下士府史胥徒如都司馬之數矣蓋此本與春官家宗人秋官家士二目同例而其簡與職互錯也約周禮輯義家司馬二條總五官所存之爵數而五分取一以例冬官之有爵者乃不及地官之鄉遂郊野官則所推得之冬官固大減於地官矣其遇大役而治民徒也亦足乎曰鄉遂郊野官平時屬司徒有大役令鄉師遂人致於司空故鄉師之職大役則帥民徒而至包州長以下官郊公邑官亦包之治其政令旣役則受州里之役要此里字與司常異司常以縣鄙對州里則縣鄙為郊野州為鄉而里為遂此以里對州而並屬鄉師則州為鄉而里為郊蓋郊以近鄉屬鄉師也以考司空之辟以逆其役事遂人之職起野役則令各帥其所治之民而至兼縣正以下官野公邑官亦包之蓋當役之時鄉自州長以下遂及郊野自縣正以下皆受法於司空以治民徒之役事是官屬之在司徒猶在司空也故冬官雖大減於地官而足以治也每都每山等官之人數不五分取一以例推冬官以悉并入大總數中何也曰得五官每數之一其人無幾而無從考其人之凡則亦無從得其食之凡皆不足算也凡内外諸侯之官其爵等人數何以定之曰大宰云乃施典於邦國而建其牧立其監設其參傅其伍陳其殷置其輔註云監謂公侯伯子男各監一國參謂卿三人伍謂大夫五人殷謂衆士王制諸侯上士二十七人此下註引其中士下士各居其上之三分二句以元文本不相屬故去之於諸侯獨計上士者猶於天子獨計元士蓋卑中下士而不之及耳輔府史庶人在官者此外諸侯官爵等人數之大略也何以知上公之一孤也曰典命云公之孤四命註以為九命上公得置孤卿一人也何以知子男之無中士也曰春秋公羊傳云古者上士下士見襄十一年明中士非周官初制也若子男而有中士則田祿不皆以四為差詳下卷而國亦不足於用矣公羊所云乃通指諸侯今獨歸之子男何也曰惟子男不當有中士耳謂公侯伯而亦無中士傳之誤也大宰又云乃施則於都鄙而建其長立其兩設其伍陳其殷置其輔註云長謂公卿大夫王子弟食采邑者兩謂兩卿疏以大夫降於卿不合有兩卿五大夫豈知卿降於公而亦不容有乎故惟在公則兩為卿五為大夫殷為上士若在卿則兩為大夫五為上士殷為下士在大夫則兩為上士五為下士蓋爵之等從其長而遞降爵之數從其等而遞減也春秋左傳謂周公舉蔡仲以為已卿士見定四年瑕禽為王卿士伯輿之大夫見襄十年是公之兩為卿卿之兩為大夫皆有明徵而其下可例推矣公卿大夫之無中士何也曰公之都小於男國男無中士則公可知而卿大夫不愈可知乎公卿大夫之縣鄙所以定其數者何曰公之都八十里受田者萬六千三百八十四家詳中卷餘並同以萬五千家為六縣中含三十鄙餘千三百八十四家以為二鄙餘三百八十四家當亦為一鄙并二鄙當亦為一縣故七縣三十三鄙卿之都四十里受田者四千有九十六家以二千五百家為一縣中含五鄙餘千五百九十六家以為三鄙餘九十六家并三鄙當亦為一縣故二縣八鄙大夫之邑二十里受田者千有二十四家以千家為二鄙而奇零附之蓋亦並計其家之中數而定也其以上士為縣正下士為鄙師皆如男國男以上下士為縣正鄙師說見後所謂禮窮則同耳公之都而加為百里也其亦有鄉遂乎曰在畿内而為鄉遂則嫌於有其國且上擬天子也大司徒施教法於邦國都鄙下連令比閭族黨州鄉之法似都鄙亦有鄉何也曰既名都鄙安得有鄉特使倣州黨以下之法教民耳有鄉者自在邦國也然則大宗伯頒祀於邦國都家鄉邑註云都家之鄉邑非歟曰此鄉邑謂鄉遂公邑析疑亦云固與邦國都家並列也三等國鄉遂之官爵略倣王畿其鄉遂之數何以定之曰凡遂之數與鄉同鄉之數與軍同蓋鄉遂俱萬二千五百家鄉在郊内為正遂在郊外為副而軍則萬二千五百人天子六鄉故為六軍則大國三軍知其三鄉次國二軍知其二鄉小國一軍知其一鄉矣六鄉者六遂則三鄉者三遂二鄉者二遂一鄉者一遂矣費誓云魯人三郊三遂疏以三郊為三鄉魯次國而三鄉三遂何也曰諸侯地沃民衆蓋亦得為三鄉三遂以就大國之列然侯與伯同七命同食者三之一則二鄉二遂乃其常觀春秋書襄公十二年作三軍則伯禽之後襄公之前嘗為二軍其時固二鄉二遂也王畿之鄉遂比長里宰以下士而大國次國乃無爵何也曰降王畿一等也王制云諸侯之上大夫卿下大夫上士中士下士凡五等是其國不設中大夫故州長遂大夫知竝以下大夫為之遞降而下則下士適當為閭胥酇長矣小國之閭胥酇長何以知非下士也曰小國無中大夫且無中士則下士適當為族師鄙師耳蓋又降大國次國一等也大國次國之野皆中士為縣正下士為鄙師何以知之曰野在遂外降於遂一等遂之縣正鄙師以上中士則野之縣正鄙師以中下士明矣小國之野上士為縣正下士為鄙師不於遂嫌乎曰小國之野其鄙師亦掌五百家政令義無不以下士者而中士本無則縣正亦不得不以上士矣王畿之郊有縣鄙之官而三等國之郊無之何也曰郊之為縣鄙者皆鄉之餘地也康成註聘禮云周制天子畿内千里逺郊百里以此差之逺郊上公五十里侯伯三十里子男十里近郊各半之夫面各百里者方二百里面各五十里者方百里面各三十里者方六十里面各十里者方二十里其方二十里者無論若方百里方六十里而三分去一受田者家二百畝則方百里者止二萬五千六百家方六十里者止九千二百一十六家皆制其鄉而不足安得縣鄙故知無縣鄙之官也然使方百里之郊為不易之地而受田者家百畝則當五萬一千二百家制三鄉訖尚足制鄙二十七縣五而上士為縣正者五人中士為鄙師者二十七人此亦不可不知也何以知大國之郊而設官則上士為縣正中士為鄙師也曰國無中大夫則遂之縣正鄙師適當以上中士而在野者降一等郊尊於野而等於遂則其宫之爵亦等於遂也大國之郊之等於遂何以知之曰地雖大減於王畿而官之爵等亦減焉則取公田之入給其祿尚足以供他用不必降郊於遂以更降其官之爵也周官祿田考卷上
