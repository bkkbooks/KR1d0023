body:
  text: 周官祿田考卷下吳江沈彤撰祿田數周天子及内外諸侯官之祿雖其籍皆亡而未嘗不散見經註及他傳記今即官爵公田二篇復以所散見者參互考之以悉差其等而粗存其數周天子之官則公食四都孤卿食都中下大夫食縣上士食甸中士食邱下士食邑其庶人在官者食井若在内諸侯則公之卿食甸下大夫食邱上士食邑下士與庶人在官者食井孤卿之大夫士食如之大夫之士食亦如之親王子弟之卿大夫士食如公次疏者之大夫士食如孤卿次更疏者之士食如大夫若在外諸侯則上公之孤食都卿食縣下大夫食甸上士食邱中士食邑下士與庶人在官者食井侯伯之卿大夫士食亦如之子男之卿食甸下大夫食邱上士食邑下士與庶人在官者食井若内諸侯之加田則其宰各以其爵分食之外諸侯孤卿大夫之加田亦如之凡所食皆取諸公田天子之公田三十二萬夫公三人人食二千有四十八夫凡六千一百四十四夫孤卿十四人人食五百一十二夫凡七千一百六十八夫中下大夫三百三十七人人食百二十八夫凡四萬三千一百三十六夫上士千一百五十人人食三十二夫凡三萬六千八百夫中士四千四百九十六人人食八夫凡三萬五千九百六十八夫下士萬九千五百有七人人食二夫凡三萬九千有一十四夫庶人在官者二萬一千七百有三人人食五十畝凡萬有八百五十一夫五十畝又不見於經而推知其爵數者上士十一人食三百五十二夫中士千有八人食八千有六十四夫下士五千有三十九人食萬有七十八夫又所闕冬官之有爵者約五百二十餘人其所食以五官食數去其公孤及鄉遂郊野官之食公孤去七千六百八十夫鄉遂官去十二萬五千五百二十夫郊野官去萬八千四百九十四夫存三萬五千有三十夫而五分取一以例之當食七千有餘夫所闕庶人在官者約四千三百四十人以五官在官庶人之食例之當食二千一百七十夫通計二十萬六千七百四十餘夫為員備位定而數可周知者常祿之總數王自食二萬有四百八十夫后世子與王子弟之未官未封者婦官女給事王宫士庶子之食及國中之法用皆於是給焉其外九萬二千七百七十餘夫以食他有爵之官及在官庶人以給國中及鄉遂郊野之法用亦分在所封都邑中若内諸侯之公田公二千有四十八夫王食者五百一十二夫自食者三百二十夫其卿二人食六十四夫下大夫五人食四十夫上士七人食十四夫下士三十三人食十六夫五十畝凡百三十四夫五十畝存千有八十一夫强孤卿五百一十二夫王食者百二十八夫自食者八十夫其大夫二人食十六夫上士七人食十四夫下士八人食四夫凡三十四夫存二百七十夫大夫百二十八夫王食者三十二夫自食者二十夫其上士二人食四夫下士七人食三夫五十畝凡七夫五十畝存六十八夫强凡所存皆以食他有爵之官及在官庶人與給國中縣鄙之法用其所加之公田皆食其宰與給縣鄙之法用若外諸侯之公田上公八萬夫王食者四萬夫自食者五千一百二十夫其孤一人食五百一十二夫卿六人食七百六十八夫下大夫二十三人食七百三十六夫上士百一十七人食九百三十六夫中士六百七十六人食千三百五十二夫下士三千有五人食千五百有二夫五十畝凡五千八百有六夫五十畝存二萬九千有七十三夫强侯五萬一千二百夫王食者萬七千有六十六夫强自食者千二百八十夫其卿五人食六百四十夫下大夫十七人食五百四十四夫上士八十七人食六百九十六夫中士四百四十四人食八百八十八夫下士千九百六十九人食九百八十四夫五十畝凡三千七百五十二夫五十畝存二萬九千一百夫强伯二萬八千八百夫王食者九千六百夫自食者如侯其卿五人下大夫十七人上士八十七人食並如侯國中士三百七十二人食七百四十四夫下士千六百一十一人食八百有五夫五十畝凡三千四百二十九夫五十畝存萬四千四百九十夫强子萬二千八百夫王食者三千二百夫自食者三百二十夫其卿四人食百二十八夫下大夫十一人食八十八夫上士五十七人食百一十四夫下士三百有五人食百五十二夫五十畝凡五百四十四夫五十畝存八千七百三十五夫强男三千二百夫王食者八百夫自食者如子其卿四人下大夫十一人上士五十七人食並如子國下士百五十一人食七十五夫五十畝凡四百有五夫五十畝存千六百七十四夫强凡所存以給他祿食及法用與在所封都邑中悉如王畿凡外諸侯食王自九貢而外皆供王行及使於諸侯及諸侯見王使於王往來過邦及王􅀁以救邦國之食與内諸侯之入税殊若畿内賞地加賞田及致仕官進士學士守固士庶子之食並無常數則減省攝官試官封邑官之食足以當之畿外國亦如之天子之公食四都孤卿食都中下大夫食縣何以知之曰載師以家邑之田任稍地以小都之田任縣地以大都之田任畺地家邑即縣註云大夫之采地包乎中下小都即都即縣即都專以大小之制言餘詳中卷註云卿之采地兼乎孤大都即四都註云公之采地夫公孤卿大夫之采地如是則未封者之所食可例推矣所以例推者何曰小宰聽祿位以禮命禮命註兼九命言自大夫而上以策書之所命皆主乎爵而以數為之等詳見彤周禮小疏明制祿之多寡本以爵等而兼命數也典命云王之三公八命其卿六命其大夫四命及其出封皆加一等是出封之前不以采地之有無而殊其命數明矣疏云王朝公卿大夫亦有舊在畿内有采地之封者今乃封於畿外也夫命數同者雖爵異而祿亦同故孤卿皆六命則皆食都中下大夫皆四命則皆食縣況爵等與命數俱同者寧以封不封而殊其食也封邑者之所食以報其大功徳也豈未封邑而不之稍殊乎曰封邑者其公田之入有貢於王然兼有山澤林麓之利且子孫世守之若未封者固無地貢而祿僅公田之入亦及身而止則所食雖同而多寡久近未嘗不稍殊也上士食甸中士食邱下士食邑庶人在官者食井何以知之曰由大夫食縣而差之每上以四則每下亦以四也是何田與爵之適相當也曰田自邑至都止五等四其都亦止六等而孤在卿上大夫有中下爵本八等若不令孤卿同六命中下大夫同四命以并爵為六等則上下之田安得皆以四為差是田與爵之適相當者由命數齊之蓋聖人於爵祿命三者固更迭參互以各得其制也公之卿食甸下大夫食邱上士食邑下士與庶人在官者食井何以知之曰其卿以下之爵等如男國則卿以下之食亦如男國也孤卿之大夫士大夫之士其食並如公不嫌乎曰孤卿之官已殺公一等大夫之官已殺公二等食雖同無嫌也若不同亦不足於食矣三等王子弟之卿大夫士其食之所如何以知之曰王母弟王之庶子與公同食八十里地有加同食百里稍疏者與孤卿同食四十里地有加同食五十里又疏者與大夫同食二十里地有加同食二十五里夲大宰及載師註疏則其官之食當亦如公孤卿大夫之官矣王子弟之食何以不列也曰王子弟非官也若其為官者則公孤卿大夫中已該之矣上公之孤食都卿食縣下大夫食甸上士食邱中士食邑下士與庶人在官者食井何以知之曰凡命數同者祿亦同則命數殊者祿亦殊典命云公之孤四命其卿三命其大夫再命其士一命命各半於王國則其食當亦降於王國矣降止一等者以降二等則下士將不得祿也侯伯之卿大夫士食如公之國也何以知之曰典命稱侯伯之卿大夫士其命數皆如公國則其祿亦皆如公國也士之一命上中下同乎曰中下士不命其祿秩專以爵等耳何以知中下士不命也曰卿三命半王之卿大夫再命半王之大夫其上士之命適半王之中士而中下士不得命矣且卿三命比王之上士大夫再命比王之中士則一命而比王之下士者必上士獨也凡卿之食縣下大夫之食甸有徵乎曰左傳衛免餘云惟卿備百邑見襄二十七年鄭志以為邑方二里見坊記疏熊氏説熊以免餘辭邑之言當據古法故如此釋之杜氏解左傳謂一乘之邑則據當時僭擬説誤也是百邑即方二十里之縣也若計其地則三分去一田止六十四邑若百邑皆田則是縣之有加田者俱卿所食也易訟卦邑三百戸鄭註云小國之下大夫采地方一成其定税三百家見坊記疏小當作大惠定宇云訟九二不克訟歸而逋其邑人三百戸无眚鄭以爻位二為大夫三百戸於采地為至薄苟自藏隱守至薄之祿而不敢與五為敵則无眚也但采地三百戸在大國誠至薄在小國未嘗不厚小字恐大字之誤成去三之一即甸也有此二徵而上下皆可無疑矣若未封者之食與己封者同亦如畿内耳晉語叔向云大國之卿一旅之田上大夫一卒之田按彼卿之祿如此下大夫彼上大夫之祿如此上士蓋一旅之田即一甸不易者一卒之田即一邱不易者也時雖多所變更猶有周官遺制子男之卿食甸下大夫食邱上士食邑下士與庶人在官者食井何以知之曰子男無中士詳上卷故上士降而食邑上士食邑則卿大夫之食之遞降明矣大國次國卿大夫士之食旣降於王國一等而小國又降於大國次國一等何也曰子男之卿再命其大夫一命其士不命皆降大國次國一等故也此亦以命數之殊而殊其祿也王制云大國三卿皆命於天子次國三卿二卿命於天子一卿命於其君小國三卿一卿命於天子二卿命於其君又云次國之卿命於其君者如小國之卿如謂如其祿是即一國之卿而非命於天子者則其祿亦有降耶曰此次國指七十里之國則卿以命於其君而祿有降或亦夏殷舊法非周官制也王制又云制農田百畝百畝之分上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庶人在官者其祿以是為差諸侯之下士視上農夫祿足以代其耕也中士倍下士上士倍中士下大夫倍上士卿四大夫祿君十卿祿内史贊王制祿註全引其文亦皆夏殷舊法歟曰未可知也要其足註周官者惟卿四大夫祿與君十卿禄耳中士以上倍以為差在周官為差祿以四者之半或試官攝官致仕官之食有如是者詳見後豈正爵之常祿乎下士與庶人在官者同百畝固周室庶邦所通行然不言公私各五十畝又不言王畿之下士加一等則亦疏矣在官庶人之食井庶邦不殊於王畿而庶邦下士之祿不殊其庶人在官者何也曰亦所謂禮窮則同也庶邦孤卿大夫之加田其宰各以其爵而分食如王畿也可悉推而知乎曰宰者家之貴臣也喪服傳謂之室老曲禮謂之家相詳喪服傳註疏在王畿公以卿為之孤卿以大夫為之大夫以上士為之由王畿例推而下則上公之孤之宰當卿卿之宰當大夫大夫之宰當上士侯伯之卿之宰當大夫大夫之宰當上士子男之卿之宰當上士矣有徵乎曰論語稱公叔文子之臣為大夫檀弓稱陳子車之宰為家大夫明侯國之卿其家臣有大夫而大夫即其宰也潘景昶云陽貨為季氏宰而援大夫之禮自處亦以此則餘所推者宜亦無不得矣文子子車果皆為卿乎曰苟子車非卿而大夫其宰安得並稱大夫至文子聽衞國之政亦見檀弓焉有聽國政而非卿者何以知上公之孤之宰非大夫而卿也曰上公之孤四命燕禮稱孤為公盖如王之公王之公以卿為宰故知上公之孤亦以卿為宰而不與三命卿之宰同也王之公果以卿為宰乎曰左傳有所謂王叔之宰者王卿士之大夫也襄十年傳云王叔之宰與伯輿之大夫坐獄於王庭按王叔伯輿皆王卿士宰即大夫大夫即宰互文也卿以大夫為宰則公之宰卿而大夫之宰上士皆可知矣凡宰之人數各有幾曰制事之謂宰本白虎通蓋家止一人猶王之有冢宰諸侯之有執政也其宰之各分加田而食也如之何曰王之公之卿食甸則上公之孤之卿亦食甸矣王之孤卿之大夫食邱則上公侯伯之卿之大夫亦食邱矣王之大夫之上士食邑則上公侯伯之大夫之上士子男之卿之上士亦食邑矣子男之卿之宰亦上士而食邑何以知之曰以子男之卿再命與公侯伯之大夫同也凡所食之取諸公田也將與之田而今自取乎抑收其穀而給之乎曰與之田而令自取惟封邑頒賞地為然其餘則皆收其穀而給之廩人掌九穀之數穀為米粟委積之通稱以待國之匪頒賙賜稍食倉人掌粟入之藏辨九穀之物以待邦用邦用即匪頒賙賜稍食之屬匪頒中祿居大半廩人註云匪頒謂遺人之職諸委積也大宰註云匪頒王所分賜羣臣也皆未盡其義稍食則食之小者廣韻訓稍為小蓋本膳夫稍事註廪人之大者惟分頒則稍食其小者也註云稍食祿廩義未析是藏米於廩藏粟於倉積委積於場以待分給也楚語觀射父云天子之田九畡以食兆民王取經入焉以食萬官畡與垓通玉篇引風俗通云十千曰萬十萬曰億十億曰兆十兆曰經十經曰垓彤謂畿内之田實不及九畡取所入以食官實不止一經觀射父皆約舉大數言之耳詳中卷正謂是也稍食與祿有異乎曰校人等馭夫之祿宫中之稍食方氏析疑云宮官字之誤也馭夫為中士下士官中則師圉府史以下易氏祓云當時一命以上謂之祿庶人在官者稍食而已見訂義司士職肜謂邦國都鄙之士多不命其稱祿當即自下士以上又婦官之食不稱祿而稱財内人女宮皆稱稍食略見内宰經内人女宮詳上卷内宰經之内人實包女宮也觀宮正食官府之衆寡内宰食王内之人民並稱稍食則易氏之說誠然而疏以稍食為命士以上之祿之通稱誤矣穀之入由民有多寡歳有豐凶而數不得齊則其給若之何曰王之圖國用也以民數而進退之倉人之待邦用也穀有餘則藏之以待凶而頒之二者雖不專言祿而祿在其中是即給之之法也墨子七患篇云一穀不收謂之饉二榖不收謂之旱三榖不收謂之凶四穀不收謂之餽五穀不收謂之饑歳饉則仕者大夫以下皆損祿五分之一旱則損五分之二凶則損五分之三餽則損五分之四饑則盡無祿稟食而已矣此蓋周官凶年頒祿之遺制若豐年則於常祿外有賜也以民數而進退其祿蓋亦如此若穀土多化瘠為沃而公田以大增也將亦均所增以益官之祿乎曰否公田之大增由受田者之甚稠也受田者甚稠則郊野之官當亦大增而朝官且必有加彼其祿皆取給於所増之公田矣又何以益舊官之祿況舊官之祿已足也其給以嵗乎月乎曰宮正之㑹稍食宮伯之均秩皆以月終則給祿當亦然耳大宰註云祿若今月俸蓋漢亦承周法也人給之乎給於其長乎曰王氏與之謂官長各受給而分之所屬也見訂義舎人職觀舎人掌平宮中之政分其財守註以為計其用穀之數按古者榖幣貨賄通謂之財此則專指穀也分送宮正内宰使守而頒之則其他可例推矣穀之外有草木鳥獸布帛之給乎曰有其孰掌之曰委人斂凡畜聚之物而以縣都之聚待頒賜所聚謂草木頒者分頒則草木之給掌於委人也大府受九賦九功貨賄之入而以家削之賦待匪頒此賦此匪頒專指貨賄與在大宰九賦九式中主粟米者異詳見彤周禮小疏内府又受諸大府以待邦之大用所謂大用者分頒在其中註以大用為朝覲之頒賜亦未備賄者布帛木大宰註則布帛之給掌於大府内府也惟掌給鳥獸者無從考耳是三者殆非月給乎曰各以其時庶人在官者人食五十畝何以知之曰庶人在官者食井井公田百畝通率二而當一則五十畝也五十畝不足以代耕則其家更食私田五十畝載師有官田註以為庶人在官者之家所受田半於農夫其受田半農人者以半食於公田也載師註蓋本古法特未及其義是也亦轉足徵所食公田之止五十畝矣府史胥徒之所食其差若何曰小司徒論農夫所受田之等云上地家七人中地家六人下地家五人七人六人五人各舉所養中率下八人同則是上上地家八人上上地即不易之地周官地等名三而實四詳中卷府史胥徒之食蓋適如地所養之等也與孟子王制以次農以下四等等庶邦府史胥徒之食亦同耳若府史胥徒之家而不止八人七人六人五人也何食乎曰此别有餘子弟之田每人通受四十畝實二十畝也漢書食貨志云士工商家受田五口乃當農夫一人五口謂餘子弟蓋士與工商别為業如府史胥徒之在官其食當亦如之家有丈夫成人亦受田半農夫載師士田下當有工田其賈田則包商言之其餘子弟不得如成人故五口當一農夫各受田二十畝夲載師註則是府史胥徒之餘子弟其受田當亦如士工商家也士工商之所食其差若何曰鄉遂賢能之入國學而升司馬者一謂之學士一謂之進士皆離農而未官類於府史則當食府史之食工商在官者類胥食當視胥不在官者其所獲當亦近胥之入富商大賈晚周乃有之如周官法固無其弊管子云先王使農士工商四民交能易作終歳之利無道相過是以民作一而得均見治國篇謂此等也至公卿大夫元士之適子衆子而為進士學士者食亦當如府史獨其家不受私田以父之祿厚也詳見後賢能之在鄉遂也若之何曰在鄉遂則士猶農也載芟之有依其士謂農夫之子弟甫田之烝我髦士若王制所云選士爾雅釋言云髦選也即農夫也故必入國學升司馬而士與農始判曰農夫自八人七人六人五人而外其餘子弟當受田幾何曰以士工商家餘子弟推之亦二十畝也孟子則云餘夫二十五畝也然則遂人之餘夫其受田何以如夫也曰遂人之餘夫謂餘子弟之成家而至五人六人七人者本王氏應電傳故受田如夫也孟子之餘夫即餘子弟與遂人殊食貨志謂農家衆男為餘夫亦以口受田如比是誤合二事為一也凡食公田百畝者實八十畝在官庶人與内外諸侯下士之食五十畝其亦減十畝之入乎曰苟減之則雖受私田而代耕仍有所不足矣況在官庶人食各有差而罪隷之家且不得受田乎此必皆全給五十畝之入不與祿多者同也罪隷為盜賊之男子其女子已入舂稾而所食亦五十畝乎曰罪隷豈無弟若子司隷云帥其民蓋包此弟子言少則所食宜減多且宜增亦五十畝以中者通其率也官爵不見於經而推知其數者祿固定矣若郊自里宰以下野自酇長以下皆以無爵而無祿則若之何曰此與遂之鄰長皆受田如農民而去其役賦則如庶人在官者也士冠禮疏云府史胥徒皆去役賦補置之蓋鄉大夫之征於國中其貴者賢者能者服公事者老者疾者皆舎而遂人遂師遂大夫於可任可施舎者皆辨之則六者之不征略如國中矣服公事者在官庶人也遂郊野無爵之官各任其職亦各其地之賢能為之寧不得與在官庶人比乎其役賦之去奚若曰凡治城郭涂巷溝渠轉委積與㑹同師田行役令夫家出民徒備馬牛車輦旗鼓兵器斧斤版築之屬坊記疏謂車馬牛兵器諸物皆國家所給誤詳方氏周官辨惑五析疑縣師職及彤井田軍賦説以至其所而給徭役皆役賦也則無不去也惟縣師稍人作民徒車輦之屬當帥而至是為無爵之官之職非役也遂之鄰長與郊之里宰野之酇長固無爵中之稍尊者而不與庶人在官者同祿何也曰在官者不得食其力在田者自不必代其耕且三者之官約四萬人遂鄰長萬五千人郊里宰千冇九十六人野酇長二萬三千八百二十六人苟皆給以庶人在官者之祿當去公田二萬夫而他法用將有所不足詳見前故不與同祿也常祿之總數而上蒙員備位定之文何也曰不及攝者故曰員備不及試者故曰位定不及祿食之增減者故曰常祿考常祿之總數宜粗得其全且增減各數不可知故必即員備位定者而言也凡所增若賞地加賞田是凡所減則試者攝者之祿食也在官庶人亦有攝與試而減其食者乎曰士官事無攝本孟子而淮南子主術訓亦云古者士不兼官則在官庶人亦如之蓋上職要而下職詳詳則煩且難惟分任則不勞而有功且下之食微亦不患衆給而財傷也若試在官之事而食減於在官者以進士試官之祿例推當亦有之也官之試與攝者祿果減乎曰司士以徳詔爵以功詔祿下士以上之祿也以能詔事以久奠食進士試為官之祿也夫試官降於正爵則其食不宜同且食必以久而奠則未乆不奠亦仍食府史之食耳是試官之祿減也夫子論管仲之家臣云官事不攝焉得儉則凡官之攝不皆儉乎儉不在祿之寡乎是攝官之祿減也若公卿大夫而封邑王子弟封邑而為公卿大夫則無庸别賦祿而總數復有所減此攝官之類亦不可稽者也王自食二萬有四百八十夫何以知之曰孟子王制言君十卿祿謂庶邦之君也差而上之王之三公食二千有四十八夫則王當食二萬有四百八十夫矣公自食三百二十夫王自食不當三千二百夫乎曰否公之所自食十其卿之全祿也則王所自食當亦十其公之全祿矣公自食果十其卿之全祿乎曰王制百里之國卿食二百八十八人君食二千八百八十人固殷周畿内外通行之祿制而八十里之國當亦無殊也八十里即畿内百里國之去加田者故祿制亦當如畿外百里國也詳前後及中卷以一夫食九人推之食二百八十八人當三十二夫食二千八百八十人當三百二十夫則三十二夫非一卿之全祿歟三百二十夫非一卿之全祿而君十之歟何以知后世子與王子弟之未官未封者婦官女給事王宫士庶子之食皆於王所自食中給也曰膳夫掌王之食飲膳羞以養王及后世子饎人共王及后之六食内宰㑹夫人以下之財用㑹内人之稍食宮伯行王宮士庶子之秩並在宮中而舎人掌平宮中之政分其財守則王子弟之未官未封者當亦該之故知皆於王所自食中給也然則宮正所比官府之衆寡内宰所分居王内之人民皆給之稍食何以不列也曰宮正之衆寡内宰之人民即庶人在官者其所食皆列於前矣王宮士庶子之食奚視曰視府史而家不受田與公卿以下子弟之為進士學士者同也婦官及王子弟之未官未封者即視其所視爵之食乎曰否否后世子與王同養於膳夫所謂王者以天下為家不容一家自為分異也詳訂義陳君舉訊然則三夫人以下當統於后之養未官未封之王子弟當統於世子之養本疏其所食要無幾耳女給事之食奚視曰此自外而入役宮中其非刑女有家者當視在官庶人也考祿田而及他法用何也曰他法用亦出於公田其夫數與祿食為消長也他法用有幾其夫數幾何曰他法用自力役而外其在國中者舎人有賔客之簠簋之實車米筥米喪紀之飯米熬穀舂人有饗食之食米稾人有内外朝宂食者之食析疑云謂之宂食者以其人自有廩祿因給事外内朝不暇自為食而官供之也廩人有羣臣之賙賜其在國中及鄉遂郊野者遺人有鄉里之委積以恤民之囏阨門闗之委積以養老孤郊里之委積以待賔客野鄙之委積以待羈旅縣都之委積以待凶荒有凡賔客㑹同師役道路之委積掌固有衆庶守城郭溝池樹渠之稍食凡此諸條非人數不定則為期無常其歲用夫數皆不若力役之可稽然要必以萬計矣力役之所用幾何曰小司徒之法上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人王畿受田者二百五十六萬家通三等地之率俱二家任五人凡起徒役無過家一人實任二百五十六萬人均人以歳之上下均力征豐年公旬用三日中年公旬用二日無年公旬用一日如康成破旬為均而通其率則每年役二日共役五百一十二萬日人食米通上中下年之率日六升四合二日斗二升八合畿内二百五十六萬人役五百一十二萬日共食米三十二萬七千六百八十斛以中地中年一夫入二百斛之數除之則用千六百三十八夫强所入也如近日方氏冬役三旬之説析疑云十月納禾稼日至而土功畢公私可用之期不過一月公旬用三日蓋九日也則豐年用九日中年六日無年三日通其率則每年役六日共役千五百三十六萬日皆三康成之數其食米用田之凡視前數亦三之也凡起徒役唯田與追胥竭作追胥不可稽四時之田其用幾何曰田不給食也小禽私之旣各有以自畀獲者取左耳上復計功而賞之州長遂師主田之賞罰要足償其勞矣故遺人頒委積廩人治糧食皆專在㑹同師役而不及田也田不給食其他果皆足以供乎曰三代之制國用也孟冬視民數歳杪視年之豐秏又以三十年之通制國用量入以為出其均節詳審如此則祿食之外亦必各得其分夫安有一之不足也王制謂天子之縣内九十三國今不據以定王畿都邑之凡何也曰縣内有七十里之國固殷制之不通於周者以是為據則妄矣内諸侯之公田其王食與自食之數何以知之曰小司徒註云采地食者皆四之一其制三等百里之國凡四都一都之田稅入於王五十里之國凡四縣一縣之田税入於王二十五里之國凡四甸一甸之田稅入於王公食王五百一十二夫非一都之公田歟孤卿食王百二十八夫非一縣之公田歟大夫食王三十二夫非一甸之公田歟若公所自食則所謂君十卿祿也孤卿自食十其大夫大夫自食十其上士亦由公之十卿祿差之耳公孤卿大夫亦皆為君其采地亦皆為國乎曰都家之稱君稱國朝大夫有明文矣采地之食王皆四之一何也曰諸男之地封疆方百里其食者四之一公之地視諸男故稅入於王亦視諸男孤卿大夫之入稅於王又自公例推之則左傳所謂卑而貢重者甸服見昭十三年此甸服指畿内是也其食王不及加田何也曰加田非采地之正無國征也其正者則八十里四十里二十里而足矣詳中卷外諸侯之公田其王食與自食之數何以知之曰公之地方五百里其食者半故公田八萬夫而王食四萬夫也侯之地方四百里伯之地方三百里其食者皆參之一故公田五萬一千二百夫者王食萬七千有六十餘夫公田二萬八千八百夫者王食九千六百夫也子之地方二百里男之地方百里其食者皆四之一故公田萬二千八百夫者王食三千二百夫公田三千二百夫者王食八百夫也若其所自食則皆所謂君十卿祿也孤卿大夫之采邑其入税於君幾何曰亦如畿内之公孤卿大夫也内外諸侯之下士亦人食五十畝何以知之曰下士與庶人在官者同受代耕之祿而實殺中士四之三則亦五十畝也耕者之所獲實百畝則其家亦别受私田五十畝若家滿九人而有餘子弟其受田亦五口當農夫一人矣下士固有爵者而其家不免於農乎曰禮國君大夫之子免農士之子皆不免農少儀云問大夫之子長幼長則曰能從樂人之事矣幼則曰能正於樂人未能正於樂人問士之子長幼長則曰能耕矣幼則曰能負薪未能負薪是其徵也王之士之子有免農者乎曰是惟上士之子耳上士即元士故元士之適子衆子並學於諸樂官也適子常在成均衆子春合諸學秋合諸射宮詳析疑諸子職若中士下士祿以遞薄則子當業農以自食其力本少儀註故載師有士田其家亦各受五十畝猶國君之士之子之耕也子男之大夫其祿不過王之中士公侯伯之上士則其子若之何曰大夫之子於國家祭祀為舞人豈以小國而殊則亦學於諸樂官而已下士與庶人在官者同受代耕之祿而耕者實百畝在孟子王制非謂其全食公田百畝之入而不别受田乎曰然蓋晚周士世其官則庶人在官者亦必世其職而子弟皆不復業農又或鄙酇之官不必盡存存者不必皆以士致食祿者少而公田亦有餘故其制如此也夫外諸侯之食王其九貢大宰有明文矣謂併供王行及使於諸侯及諸侯見王使於王往來過邦及王所以救邦國之食何以知之曰王行者王之巡守殷同征伐也掌客云王巡守殷國按疏殷國即殷同肜謂國當作同字之誤也方氏云殷同即巡守而㑹諸侯於方嶽詳析疑大行人掌客二職則國君膳以牲犢令百官百牲皆具百牲具則米禾之具不必言矣大宰九式無軍旅蓋有事則遺人致道路之委積出畿則侯國供其資糧也見析疑大宰職左傳鄭申侯見齊桓曰師出於陳鄭之間供其資糧屝屨見僖四年是小國於大國且然況諸侯於天子乎以斯三者知供王行之食也崧髙之詩云王命召伯徹申伯土疆以峙其粻式遄其行周語稱王使為過賔則膳宰致飱廩人獻餼皆官正涖事是皆供王使過邦之食也聘禮云使者若過邦餼之以其禮註云賔介米皆百筥夫諸侯於鄰國聘使之過猶供其米則其供鄰國君見王使於王過邦之食可知矣王之使於諸侯何曰在大宗伯則以吉禮事邦國之鬼神示而祭五嶽祭四瀆以凶禮哀邦國之憂以軍禮同邦國而各有五以嘉禮而以脤膰親兄弟之國以賀慶親異姓之國也在大行人則王撫邦國而嵗徧存三歳徧覜五歳徧省七嵗九歲十一歲又徧省也諸侯之見王及使於王何曰在大宗伯大行人則春朝夏宗秋覲冬遇時㑹殷同時聘殷頫與歸脤也在小行人則春入貢而秋獻功也王之所以救邦國者何曰此即大宗伯之以凶禮哀邦國之憂者五也小行人云若國札喪則令賻補之若國凶荒則令賙委之大司徒亦云大荒大札則令邦國移民通財若國師役則令槁禬之若國有旤烖則令哀弔之皆治其事故夫令者固令鄰國之諸侯治者必使其國之有濟則於邦國之憂之大者不獨以侯國自食者救之而并以食王者救之亦可知矣賞地加賞田與致仕官進士學士守固士庶子之食以減省試官攝官封邑官之食當之其果足乎曰凡進士之任官必試故試官最多士官事無攝公孤卿大夫則皆有攝官詳鄭氏伯謙太平經國書葉氏時禮經㑹元及訂義陳及之説三家語亦各有未當者官而有封邑封邑而為官亦多有之三者之減省常祿實大以當賞地而下數者宜亦無不足也賞地之所自食有幾曰王食參之一則自食參之二矣經所云參之一食者何必非自食乎曰上云凡頒賞地下云惟加田無國正則參之一為國征而食之必在頒地之王矣致仕官之所食幾何曰於經無考也白虎通云三分其祿以一與之又引王度記云養之以其祿之半前説當謂食大夫以上後說當謂食元士以下也若其家則皆别受田五十畝耳何以徵之曰致仕者去官而居宅謂之宅者其家所受田謂之宅田亦半於農人見載師及士相見禮經註也中下士家已受五十畝致仕而家復有所受乎曰致仕則祿薄而子惟自食其力當更足之以五十畝也若元士以上則致仕而其家始受田蓋仕之時祿厚子為學士或任官無庸别受田致仕則子孫之不才者將不免於農故亦稍授田使習之也然則仕者不世祿乎曰惟受采地及賞地之官得世其祿本趙氏孟子註未受地者本非有大功殆養之没身而已守固士庶子之食奚視曰此分守城郭溝池樹渠之固當視王宫士庶子也其他已備論於前矣余著此書起乾隆七年之春其正文三篇甫畢而心疾作疾已又他有修纂至十三年季秋乃能為問答發明之凡得五十一條而書成友人顧君肇聲與徐君靈胎欲推廣窮經致用之義請版行之余遜謝不敢當旣復念此書固專考周家之祿然其他均平天下之大經連類推闡者亦不少而凡法與數間皆灼然美意之存矣苟明其法數以得其意而即本其意以行其法數則雖時異乎古而或潤澤之或變通之亦自可無所不宜然則此書殆不無小補於治道而正可以質世之究心經濟者乎遂以復於二君二君乃互勘而付諸梓人時十五年冬也彤又書周官祿田考卷下
