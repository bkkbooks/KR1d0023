body:
  text: 周官祿田考卷中吳江沈彤撰公田數制王畿及畿内外國邑之地皆主於田田有公有私私田民所受公田則祿所自出也故考周官及内外諸侯官之祿者更必盡知公田之約數王畿地方千里為方百里者百山陵林麓川澤溝瀆城郭宫室塗巷三分去一為田六十四萬井為夫五百七十六萬有不易有一易有再易一易者二而當一再易者三而當一通三等而約之為二百八十八萬夫受田者二百五十六萬家公田三十二萬夫若畿内都邑以下之地大都含四都方八十里為方十里者六十四三分去一為田四千有九十六井為夫三萬六千八百六十四通其等為萬八千四百三十二夫受田者萬六千三百八十四家公田二千有四十八夫小都如一都方四十里為方十里者十六三分去一為田千有二十四井為夫九千二百一十六通其等為四千六百有八夫受田者四千有九十六家公田五百一十二夫家邑如縣方二十里為方十里者四三分去一為田二百五十六井為夫二千三百有四通其等為千一百五十二夫受田者千有二十四家公田百二十八夫若大都旁各加十里為方十里者三十六所加兼四旁及四隅法本康成小司徒註下並同則方百里方百里曰同小都旁各加五里為方五里者三十六則方五十里家邑旁各加二里半為方二里半者三十六則方二十五里其所加皆曰加田如都邑之法而無國征地之曰成者皆方十里為方一里者百其三分去一者以其二為甸其去不及一者甸之外或為邱或為邑或為不井之田甸各方八里為田六十四井為夫五百七十六通其等皆二百八十八夫受田者二百五十六家公田三十二夫邱各方四里為田十六井為夫百四十四通其等皆七十二夫受田者六十四家公田八夫邑各方二里為田四井為夫三十六通其等皆十八夫受田者十六家公田二夫井各方一里為田九夫為畝九百通其等皆四百五十畝受田者四家公田五十畝若畿外邦國之地上公方五百里為方百里者二十五三分去一為田十六萬井為夫百四十四萬通其等為七十二萬夫受田者六十四萬家公田八萬夫侯方四百里為方百里者十六三分去一為田十萬二千四百井為夫九十二萬一千六百通其等為四十六萬有八百夫受田者四十萬九千六百家公田五萬一千二百夫伯方三百里為方百里者九三分去一為田五萬七千六百井為夫五十一萬八千四百通其等為二十五萬九千二百夫受田者二十三萬有四百家公田二萬八千八百夫子方二百里為方百里者四三分去一為田二萬五千六百井為夫二十三萬有四百通其等為十一萬五千二百家受田者十萬二千四百家公田萬二千八百夫男方百里為方十里者百三分去一為田六千四百井為夫五萬七千六百通其等為二萬八千八百夫受田者二萬五千六百家公田三千二百夫其都邑以下之公田法與數悉如畿内惟成亦有加云凡通不易一易再易之等而約其夫數皆以二當一其地具三等者即界内而通之不具三等者并界外以通之凡公田一夫去二十畆為廬舎實八十畝王畿地方千里三分去一其井數夫數與康成載師註不合何也曰載師註計夫而不計井故方千里為九百萬夫去其三之一為六百萬夫今計井而後計夫則方千里而去其三之一止六十四萬井夫亦止五百七十六萬矣康成從王制今從漢書刑法志所以從漢書者以公田出於井也康成小司徒註亦計井而後計夫豈有異於漢書也曰漢書渾言畿内庶邦之井制未必不兼鄉遂公邑小司徒註則以井為專在都鄙也井不專在都鄙歟曰然小司徒大比六鄉四郊之吏而攷夫屋司馬法夫三為屋屋三為井見小司徒註屋在鄉郊則井可知鄉郊有屋井則遂與公邑可知且六十四井為甸而甸師所掌之王藉在南郊祭統云天子親耕於南郊以共齊盛孟子亦云鄉田同井則鄉郊之制井益明矣故康成分十夫有溝百夫有洫千夫有澮為鄉遂田不井之法匠人井間之溝成間之洫同間之澮為都鄙井田之法亦非也蓋二法無殊通行畿内與鄉遂郊野之制井相成云附五溝異同說遂人云凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達於畿匠人云匠人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅍒田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮專達於川凡二篇五溝之法皆徧行畿内似異實同而自漢迄今註解未定彤沈潛反復有年乃能悉其㑹通而别為之說曰遂人夫間有遂匠人田首謂之遂夫間為畎水所入即田首本無異也若遂人十夫有溝匠人九夫為井井間謂之溝遂人百夫有洫匠人成間謂之洫為九百夫之地遂人千夫有澮匠人同間謂之澮為九萬夫之地則地形有大小或且懸絶然即夫與尋尺互計三溝之所占要無不合也井九夫以溝加一夫則得十夫每九夫而間以溝其溝不占井間乎十井為通通九十夫以洫加十夫則得百夫九十夫所加之十夫即并十井所各加之一夫地非有多寡因溝涂之大小而異其辭耳餘皆倣此九十夫於成為十之一每十之一而間以洫其洫不占成間乎成九百夫以澮加百夫則得千夫九百夫於同為百之一十成為終終九千夫則又以九百夫加百夫而得千夫者九也九千夫於同為十之一每百之一而間以澮焉每十之一而仍間以澮焉其澮不占同間乎故遂人之所有即匠人之所為特匠人多舉其全體遂人多舉其偏隅所以或舉偏或舉隅者十百千萬既層遞而上文勢即不得不然而學者不察遂以為異法耳且井間廣四尺之溝一溝長三百步六尺為歩三百步為千八百尺以四尺乘千八百尺得七千二百尺除以六尺得千二百尺千二百尺為二百步步百為畝畛如之共四畝畝百為夫是即九夫所加之一夫而占其二十五之一也其餘則以為洫與涂之屬焉成間廣八尺之洫九洫長三千步九其廣為七十二尺七十二尺為十二步以十二步乘三千步得三萬六千步為畝三百六十為夫四而弱涂如之共七夫强是即每九十夫所各加之十夫而占其十之一弱也其餘則以為澮與道之屬焉同間廣二尋之澮縱横各九按畎縱者遂横畎横者遂縱遂與溝溝與洫亦如之惟澮則有縱有横而四達蓋以川必環同而澮專注於川四逹則水之來往便利且都邑之封疆必環以溝以縱横之澮當之則四而皆廣深而足為阻固也各長三萬步九其廣為百四十四尺百四十四尺為二十四步以二十四步乘三萬步得七十二萬步為畝七千二百為夫七十二倍之為百四十四夫道如之共二百八十八夫是即每九百夫所各加之百夫而占其百之三强也其餘則以為川與路焉然則匠人之所占俱遂人之所加而三溝之占地豈有殊哉至萬夫有川則以川之屬而加千夫於九千夫也九千夫之地為川之屬所占者不及二百夫乃加千夫而遂云萬夫亦遞舉十百千萬成數之文勢然耳乃匠人於川獨不見其度數無從互計蓋是固川之天成者若其人為者環一同受澮所達由澮而推之每一偏長當如澮亦三萬步廣當倍澮為四尋四尋為五步二尺以五步二尺乘三萬步得十六萬步為畝千六百為夫十六四之為六十四夫川與四同為界當各分其半半川為三十二夫川兩旁有路當去鄰界一而為之長如道廣倍半川為六十四夫共九十六夫是即每九千夫所各加之千夫而占其百之一强也其餘則以為澮與道已上者焉凡一同含十終去一終存九終九終含九十成九十成含九百通九百通含九千井九千井所各加之一夫并而為九百通所各加之十夫九百通所各加之十夫并而為九十成所各加之百夫九十成所各加之百夫并而為九終所各加之千夫數屢増而實不増總為九千此九千夫即所去之一終自溝畛至川路悉分布其間而占其十之二弱溝畛占三百六十夫洫涂占六百四十八夫澮道與川路所占見上餘十之八而强則以為城郭宫室之屬而所占亦無多其餘若平土則更為田若山陵林麓川澤則可田者田之按地官有山農澤農則山澤之地亦有為田者否則因之至遂與徑所占蓋即一夫之地曰田首明不在田外也山陵林麓川澤溝瀆城郭宫室塗巷之一分其所占為井三十六萬為夫三百二十四萬較二分之田數何以贏百之四也曰古者制國稅軍賦皆因井田方百里為六千四百井方千里為六十四萬井苟井數無闕則賦稅亦無不足故有贏皆并入所去中也其所贏有過百之四者乎曰過百之四則井田數闕而不足以制賦稅矣載師疏謂畿内山林多豈有二分土田蓋地大或然地小者必不然也井田之數整則其形亦方平乎曰不方平田不可井然方平不盡如圖康成已言之若截長補短以方其實俾分數悉均亦賴有步算諸法耳凡山林之屬之所占可别而計之乎曰五溝五涂而去其徑遂其所占為井萬五千四百六十六為夫十三萬九千二百溝畛占三萬六千夫洫涂占六萬四千八百夫澮道占二萬八千八百夫川路占九千六百夫其餘則皆溝涂外數者所占也商子來民篇云地方百里者山陵處什一藪澤處什一谿谷流水處什一都邑蹊道處什一亦約數溝涂之夫數何以知之曰以匠人之尋尺乘除而得也其法具五溝異同說矣城郭宫室之所占可推知乎曰可推者惟王之城郭與農夫之家耳王城郭之所占畿何曰匠人營國方九里為井八十一為夫七百二十九逸周書作雒篇云城方千六百二十丈故以六為七今從大平御覽居處部所引改正按百八十丈為一里其丈數與里數正相符則鎬京當亦然矣郭之大者曰郛公羊春秋文十五年傳云郛者何恢郭也註云城外大郭作雒篇云郛方七十里故以十為百則太大且下云郊甸方六百里不應郊甸俱在郛内今從後漢志註所引博物記改正御覽引周書作七十二里則為井四千九百為夫四萬四千一百其下云南繫洛水北因郟山則郛之大小蓋因地勢異於城之有定數故鎬京之郛不可推也公卿大夫之城郭亦可推乎曰其所占夫數可推而采地無常城郭之總數不可推也其所占各幾何曰由王之城遞推之公城方七里侯伯城方五里子男城方三里三公之都視諸男城亦如之當為井九為夫八十一以差而下卿之城當方一里旁各加五分里之二本左傳隱元年中五之一疏定數為井三為夫二十七强大夫之城當方一里為井一為夫九也鄭祭仲之論都城云先王之制大都不過參國之一中五之一小九之一蓋畿内外通行之中都猶畿内小都小都猶畿内縣也郭所占皆無考以孟子國䇿三里之城七里之郭推之國䇿於即墨旣云三里之城五里之郭而又云五里之城七里之郭明前五字為七之誤後五字為三之誤矣則郭之夫數當四倍於城强也農家之所占畿何曰廬在田中勿庸計其在邑之宅家亦二畝半本趙氏孟子註受田者二百五十六萬家當占地六萬四千夫也地之分不易一易再易也惟見於大司徒制都鄙之條今以㮣畿内及庶邦何也曰無大小中外而各有厚薄地力之常故小司徒之均土地遂人之辨野土大司馬之以地制賦皆分上中下三等而通行畿内及庶邦不易即上地一易即中地再易即下地豈獨為都鄙之制也其所均所辨所制果通行畿内及庶邦乎曰小司徒稽國中及四郊都鄙之夫家九比之數頒比法於六鄉之大夫大比則受邦國之比要大司馬布政於邦國都鄙皆兼畿内與庶邦則其均土地及以地制賦可知矣遂人治野達於畿所謂野者乃城郭外之通稱詳上卷則其辨野土之兼鄉郊都鄙可知而庶邦遂人之所辨亦可知矣不易一易再易之為上中下地何以知之曰大司徒不易之地家百畮而遂人上地夫一廛田百畮萊五十畮一易之地家二百畮而中地夫一廛田百畮萊百畮再易之地家三百畮而下地夫一廛田百畮萊二百畮畝數同則其地宜無不同也不易之地家百畝較上地之家不少萊五十畝乎曰家止百畝則為上地之上者而終不易百又五十畝則僅為上地而或易或不易三分百五十畝而嵗種其二休其一更三歳而徧蓋每分連二歳不易至三歳乃易云大司徒與遂人蓋各有二等彼此相備故畝數不同而同也孟子王制皆言一夫耕百畝而無易不易之差何也曰孟子王制因代耕之祿而計五等農夫食人之多寡以為差故專言所耕不及地等而地等固寓其中也此五等農夫所受田在周官為上地以上地家七人而此之中農亦食七人也由是例推則中農食八人而上食十人者為上上地中農食六人而下食四人者為中地中農食五人而中次食四人下食三人者為下地皆可知矣通地之三等而約為二夫當一夫豈以其古法而輒用之乎曰非獨以古法而用之蓋二當一則去其夫數之半而所存皆歳種之田雖一易再易猶之不易而考祿可得其實也歳所種之夫數果皆準乎曰其數由通且約而得之安得皆準即間有準者亦不能無所增減蓋人稠則力田者多每化瘠為沃而歳種屢増稀則反是也然歳種之中數固即此通且約者而存亦不準而準者矣大都含四都而方八十里小都如一都而方四十里家邑如縣而方二十里何以知之曰小司徒四甸為縣四縣為都註云百里之國凡四都五十里之國凡四縣二十五里之國凡四甸按二十五里乃家邑之有加田者若四甸之正則方二十里也五十里乃小都之有加田者若四縣之正則方四十里也百里乃大都之有加田者若四都之正則方八十里也至載師以家邑之田任稍地稍地如甸地之制則四甸為家邑而家邑亦如縣地之縣也以小都之田任縣地則四縣為小都而小都亦如畺地之都也以大都之田任畺地畺地制為都則以四都為大都而大都含四都也然則小司徒之縣都與載師之都邑有異乎曰載師之都邑謂采地小司徒之縣都謂凡土田封則為采地未封則為公邑也本縣士註本註亦專指采地殆未審耳何以知稍地如甸地之制而畺地制為都也曰四邱為甸出車一乘而稍人掌令邱乘之政令稍二十同并郊甸凡三十六同而作雒篇謂郊甸中六百里以甸包稍則稍地之亦制為甸明矣大宰之九賦家削之外繼以邦縣邦縣之外繼以邦都邦縣即縣地邦都即畺地則畺地之制為都亦明矣何以知家邑亦四甸小都亦四縣大都則四都也曰小司徒由縣而都則都之下為縣載師由家邑而小都則小都之下為家邑家邑之與縣小都之與都其等皆同則其制亦同而大都之制亦可推知也已制都邑之大小以地亦本載師及小師徒經註也而林氏椅據大司徒經謂家百畝家二百畝家三百畝皆計其室數以為都邑而都邑之大小初不繫其地見訂義何歟曰林誤也大司徒云凡造都鄙制其地域而封溝之謂先量地定域也則都邑之大小正繫其地下云以其室數制之乃即域内之室數以為縣鄙之屬使多寡與地邑相得民寡則徙之入多則徙之出非計其室數以制都邑也故仍從載師及小司徒云計縣都之地則三分去一計甸邱邑之地則不去三之一何也曰此亦定以小司徒經註耳九夫為井方一里四井為邑則方二里四邑為邱則十六井方四里四邱為甸則六十四井方八里本不兼三分之一無可去也四甸為縣則二百五十六井宜方十六里而方二十四縣為都則千有二十四井宜方三十二里而方四十本兼乎三之一不可不去也其或兼或不兼何也曰縣都地大則山陵林麓川澤六者必有所兼甸邱邑地小又皆井田積實數無自而兼也都家之地而三分去一亦必有山澤林麓乎曰然山澤林麓所以資灌溉助食用不可無也且使都家而無之則皆屬諸天子而鄉遂公邑之田所以供祿而給用者不亦有所不足哉然則邍師辨地之名物之可以封邑者何但及邱陵墳衍原隰也曰亦邍師分掌其所辨則然耳若大司徒之制都鄙固兼辨山林川澤之名物也故在王制惟山之名澤之大者不以朌則其他無不朌也所以都家之田亦約止三之二也有徵乎曰周頌云駿發爾私終三十里吳氏澄以為小都之里數詳周禮考註夫小都之里方四十而但云三十則亦止三之二也小都如此則大都與家邑可知矣詩之云亦服爾耕十千維耦何也曰小都之田四千六百有八夫每夫耕者一耦當九千二百一十六人云十千者猶三分方四十里之二當三十二里而云三十里舉其成數也詩云駿發爾私而小都之田數則兼公得無異乎曰耦以十千則合公私田而大事其耕矣詩之義固上下相成也康成以夏少康在虞田一成而衆一旅為二夫當一夫則封邑亦專計田矣豈夏時畿外之法異於周之畿内乎曰所謂田一成者乃去三之一以為田亦止五百七十六夫或稍贏耳至衆有五百人蓋其田多不易而家受一夫者多也小雅云倬彼甫田歳取十千傳謂一成九萬畝其公田萬畝以為公卿之祿則所封不皆田乎曰李文貞以此為述豳公以來舊俗不係於公卿詳詩所則甫田非采地乃豳公之所闢適一成無山麓川澤又皆不易故公田有十千也由數事推之則地之無山麓川澤者雖介在都家亦必但為公邑而不為采邑矣都與家之地果皆有三等乎曰不易之地家百畮一易之地家二百畮再易之地家三百畮大司徒謂凡都鄙之受田者也註云都鄙謂王子弟公卿大夫采地是都家之地皆三等固有明文矣縣師云凡造都邑量其地辨其物而制其域邑者家邑物主易不易而言本訂義黄氏度說則又家有三等地之徵也邦國之都家其地亦如畿内乎曰縣師兼掌邦國之地域則所謂凡造都邑者通乎畿外本訂義王昭禹説而其地亦各有三等矣故康成謂齊國下大夫之邑三百家詳坊記疏蓋方一成而去三之一又通三等六百夫而皆以二當一也夲易訟卦疏三百六百皆舉成數凡地之三等亦相為贏縮乎曰縣師旣辨其物贏縮宜不相逺若商子謂方百里而惡田處十二良田處十四見來民篇其大較也良田即不易一易者惡田即再易者較通為二當一之率則良田贏十一惡田縮十一也然夏少康在虞田一成而衆一旅殆又不易之等獨贏也詳見前則周之所封宜亦有如是者矣加田見司勲謂田加於賞地也采地而亦有加田乎曰晉語云官宰食加乃統言凡益邑者家臣之所食則采地亦有加也庶邦如是畿内可知矣其所加里數何以定之曰王制畿内國不過百里乃殷周所同漢書刑法志謂百里為采地之大者專就殷周言不及夏蓋夏時采地在畿外侯服也詳胡氏渭禹貢錐指故八十里者以百里為極等而下之則四十里者極於五十里二十里者極於二十五里皆八分采地之邊數以其一為旁加之數蓋古法而存於小司徒註者也註雖不及加田然百里而止為四都則所餘三千六百井固足包加田於其間下焉者亦如是耳畿内國之不過百里何也曰過百里則不足於封矣古之百里當今幾何里曰五十五里有二十二步强蓋古者三百步為里見穀梁春秋宣十五年傳孔子家語大戴禮記王言篇今三百六十步為里三百六十歩為里見唐李氏翺平賦書宋如唐見馬氏文獻通考王禮第十二卷元以二百四十步為里見陶宗儀輟耕錄明如宋見洪武正韻今亦仍之大於古六十步古一步六尺從小司徒註所引司馬法及漢食貨志今一步五尺一步五尺見唐杜氏通典刑類甲兵篇之守拒法宋迄明沿之國朝以五尺五寸為步見王貽上居易錄所載孔氏尚任周尺考今仍以五尺為步凡歴代步弓尺長短不一今步之尺乃乾隆元年工部所重頒當今裁衣尺之中者九寸而古尺較今尺止七寸四分今尺較古尺乃一尺三寸五分古步較今步止四尺四寸四分今步較古步乃一步有七寸五分故今之三百六十步當古五百四十五步强百之為五萬四千五百有四步强其三萬步為古之百里以五百四十五步强除之則得五十五里有二十二步强也以所得數開方之其積有幾曰三千有二十九里强也凡旁加算法多有奇零其與之地也若何曰與之地非盡環其都邑必有但足其加之之數者若小都别以九成家邑别以二成一邱則已足而整也九成即方五里者三十六之整數二成一邱即方二里半者三十六之整數所加無國征何也曰不以田税四之一入於王也入税法詳下卷司勲註云所以厚恩是也都邑而未加田也則宰何食曰分其粟與之而已加田之不及上士何也曰公卿大夫之田亦必有大功而後加上士則爵卑任輕雖有功不大故未嘗有采地也何況加田若受賞地與出封為附庸則有之矣司勲云凡賞無常輕重眂功白虎通考黜篇云元士有功者為附庸通典云天子元士出封為附庸加一命為四命但不進爵猶稱名與士同故春秋傳云附庸之君名也詳職官類秩品篇附古尺圖右圖摹宋秦熺鐘鼎欵識册所載册又載尺底篆文銘云一周尺漢志劉歆銅尺後漢建武銅尺晉前尺並同按宋高若訥依隋志定十五等尺第一為周尺即此也詳蔡氏律呂新書盖此於後人所定周尺中為近古且最著云上公之地方五百里侯方四百里伯方三百里子方二百里男方百里見大司徒之經而孟子云公侯皆方百里伯七十里子男五十里大都之地方八十里加為百里小都方四十里加為五十里家邑方二十里加為二十五里本載師及小司徒之經注而孟子云天子之卿受地視侯大夫受地視伯元士受地視子男其說並殊於周官何也曰孟子因籍去而僅聞其略此所云並周所沿夏商之制耳考諸周官畿内外皆無七十里之國王制有七十里之國註疏以為夏殷之制畿内有國始於殷詳見前而湯國七十里即見孟子書由是以觀而其他之沿於夏商亦明矣王制謂天子之三公之田視公侯卿視伯大夫視子男元士視附庸與孟子之説又殊何也曰王制蓋别有所据然要非周所定制也其曰田者即孟子之地篇末云方百里者為田九十億畝則未去三之一而已稱田矣或以為皆實田誤也周公於畿内外之國既各别差其里數而尚存夏商之制何也曰周制初定豈得盡行苟前代諸國無故而増減其地勢必煩擾不安故且因之即武王分土惟三之義也詳朱子語類周禮小戴禮二卷周公别差諸國之里數畿内視夏商則減畿外則大増何也曰畿外諸國夏商以來漸相吞併廓地已大周公因更定其制以安其無辜者而又以待封大功徳之臣俾錯處其間以藩衞王室亦詳朱子語類故大増若畿内諸國本無權力又象賢而世守者少詳王制註疏及訂義陳君舉說周公因稍更焉以就井田以四上下之差故減也然則孟子於畿外諸國謂齊魯俱封百里而以今魯方百里者五為當損何也曰此孟子即所傳聞以論當時之地域意在諷止其戰伐耳左傳襄二十五年載子産責晉所云列國一同自是以衰者與孟子相類孔疏亦謂指夏殷時朱子謂是應急之説非至論是也若論封疆之實則必如晏子春秋謂太公受地五百里見内篇三蓋太公實以太師加命受上公之地故史記世家亦特謂齊為大國其後嗣稱侯不稱公蓋更賜侯爵也史記謂伯禽康叔各四百里者見漢興以來諸侯年表乃與周官之制合也後人好以孟子駁周官否則强傅㑹之皆未及深考者也大司徒所云公之地方五百里侯方四百里伯方三百里子方二百里男方百里其封疆也所云其食者半食者參之一食者四之一鄭司農謂公侯等所食租稅則田也如其説田之多者不過地之半今以三分去一之外皆為田則其説果不可從歟曰然三分去一見於王制見於漢書刑法志乃三代畿内外所通行食貨志述魏李悝之言悝言地方百里山澤邑居三分去一為田六百萬畝且在戰國則井田未變此制亦未變豈周家方行井田而已紛更也若謂即食者而去其三之一則田且益寡何大其封疆如是而男更無以為國謂大其封疆以包附庸則附庸於諸侯非牧正帥長及有徳者未之輕錫而所錫亦在封疆之外本康成註故知公侯等之田必皆三分之二也然則經所云食者必從康成地貢輕重之説歟曰地貢者市美物以貢王室特食者之一耳食者則并留穀五等國以待王之用所包甚廣本東萊呂氏説詳馬氏通考田賦第三卷凡王行及使於諸侯及諸侯見王使於王往來過邦及王所以救邦國之食皆在其中詳下卷故不曰貢而曰食食讀去聲如孟子食人之食蓋大司馬上地食者參之二云云自地之可食者言此則自有其地者之食人言也三分去一之文周官何以無之曰此司空之事當見於冬官冬官亡故無文也邦國之成之有加何以知之曰成者公侯伯以封下大夫子男以封卿者也詳下卷及其有大功而加田亦法之常耳但成之旁加為方一里四分里之一者三十六較縣益奇零尤必即便近之整地與之矣凡通不易一易再易之等固約為二夫當一夫矣而有或易或不易者介其間則若之何曰或易或不易者與全不易者皆一夫二十五畝而當一夫并一易再易者為六夫二十五畝而當三夫四其所并又二十五夫而當十二夫也一夫二十五畝而當一夫何也曰不易之地家百畝或易或不易之地家百五十畝通其等而約之則家百二十五畝也六夫二十五畝而當三夫較二夫當一夫之率畿内宜減十一萬五千二百夫則公田宜減萬二千八百夫曷為不計其所減而專用二當一之率也曰二當一乃槩以三等六百畝之整數折半通算便於例推故專用其率若公田所減在三十二萬夫中僅去二十五之一於國家食用未甚贏縮且嵗種之夫數有時而増則公田亦不果減是可不計也公田一夫去二十畝為廬舎漢書食貨志之說也於經有徵乎曰中田有廬詩固言之矣孟子云八家皆私百畝同養公田漢志云八家各受私田百畝公田十畝二説其小異乎曰否孟子略而漢志詳也至各受與同養則分領而後助治事亦相因耳八十畝之稅入幾何曰九穀以粟為主見倉人註十斗曰斛見聘禮及漢律歴志在中地歲常得粟百六十斛也何以徵之曰魏中地也見詩甫田疏漢食貨志述魏之李悝云治田百畝歳收畝一石半為粟百五十石按周官中地家六人中歳人月食食三鬴六斗四升曰鬴每月食一石九斗二升歳食二十三石有四升六人歳凡食百三十八石二斗四升則以百五十石食六人尚餘十二石弱悝復言供五人不足者兼賦税及凡費用計之乃當時法上孰其收自四中孰自三下孰自倍張晏註云大孰收六百石中孰四百五十石下孰三百石小饑則收百石中饑七十石大饑三十石若取上孰補大饑中孰補中饑下孰補小饑其所補之餘復補無年如春秋莊二十八年大無麥禾之類及中歳之不足歳常得二百石斛亦稱石宋以前皆然近代則五斗為斛兩斛為石八十畝故減四十斛也至上下地歳入之常則加減七者之所收以通其率而數亦無不得矣管子治國篇云常山之東河汝之間中年畝二石一夫為粟二百石按戰國䇿常山之東為趙河汝之間即魏中年畝二石乃其上地兼饑孰通計之歳常得三百石也禁藏篇云歳兼美惡畝收一石則一夫為粟止百石蓋又就下地而言粟與米同乎曰對文則粟有甲米無甲粟一斛為米五斗禹貢之四百里粟五百里米是也散文粟即為米故食貨志以百畝之歳收為粟百五十石也苟有甲則畝百而米止七十五石尚得謂中地中歳哉百六十斛當今幾何石曰三十二石蓋漢之量與周同詳律吕新書而漢量有容二斗七升者當今五升四合有容六升者當今一升二合是古之十當今之二也本閻氏若璩孟子生卒年月考容六升者彤親見而較之古之百畝當今幾何畝曰古者百步為畝自漢至今常以二百四十步為畝大於古百四十步大畝始於漢見桓寛鹽鐡論顧氏玉篇謂始秦孝公先師何學士云意秦但行之西陲漢乃徧於天下也古步六尺今步五尺漢之尺與古同今之尺以一尺當古一尺三寸五分五尺當古六尺七寸五分故今二百四十步當古三百六十四步强百之為三萬六千四百有六十四步其萬步為古之百畝以三百六十四步强除之得二十七畝强則所當今之畝數也朱子語類周禮卷云古百步為畆今二百四十步為畝百畆當今四十一畝彤按宋步弓之長短略同於周故但每畆加百四十步計之也四十一畝下不云三分畆之二舉成數粟之外有入乎曰有閭師縣師所徵草木鳥獸布帛之貢也草木布帛皆出邑宅田廬之所樹鳥獸則豕犬雞畜於宅廬馬牛羊畜於休不耕之地詳見彤周禮小疏無一不闗涉公田而邑宅復與田廬相表裏故皆當有入也若不易之地歳耕種而不事馬牛羊之畜者若之何曰地之易者穀入少而有所休者以事畜則所貢益以馬牛羊不易之地無所休者以事畜則無馬牛羊之貢而穀入多矣易物而計其直蓋亦無不均也穀之入十取其一也草木烏獸布帛之入亦十取其一乎曰草木布帛與鳥獸之豕犬雞即載師園廛之征當二十而取一馬牛羊即載師逺郊牧地之征當二十而取三也載師以牧田任逺郊之地則畜牧自逺郊始其所征重於農田者人力少而利厚也餘詳彤釋地征篇周官祿田考卷中
