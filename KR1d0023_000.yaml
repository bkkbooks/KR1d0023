body:
  text: 周官祿田考禮類一周禮之屬提要臣等謹案周官祿田考三卷國朝沈彤撰彤以班祿之法自宋歐陽修有周禮官多田少祿且不給之疑後人多從其説即有辨者不過以攝官為詞彤獨詳究周制以與之辨因撰是書為官爵數公田數祿田數三篇凡田爵祿之數不見於經者或求諸注不見於注者則據經起例推闡旁通補經所無乃適如經之所有其説精密淹通於鄭賈注疏以後可云特出其中間有未安者如謂子男之國不得有中士考孟子稱小國地方五十里有中士倍下士之文趙岐注曰子男為小國王制曰王者之制祿爵公侯伯子男凡五等諸侯之上大夫卿下大夫上士中士下士凡五等孔頴達疏謂諸侯統公侯伯子男則子男有中士矣王制又曰若有中士下士數各居其上之三分鄭注上中下士二十七人各三分之周禮太宰賈疏釋此文謂朝聘之位次國之上士當大國之中士中士當下士下士當其空小國之上士當次國之中士中士當下士下士當其空故云各居其上之三分若子男無中士則小國之士不敷三分之數與經文戾矣彤又謂加田之制國八十里者其加田極於百里四十里者極於五十里二十里者極於二十五里考司勳文曰凡賞地無常輕重視功又曰惟加田無征鄭注加田既賞之又加賜以田夫賞田且無常數况加田乎春秋宣十五年傳晉侯賞桓子狄臣千室又賞士伯以瓜衍之縣襄三十六年傳三月甲寅享子展賜之以先輅三命之服先八邑襄二十七年傳公與免餘邑六十襄二十八年傳與晏子弼殿其鄙六十此無論其為賞為加率無常數正可與司勳文相證而彤定以二十里十里五里稽諸經傳略無明文又彤算畿內百萬井去山陵林麓之等三十六萬井存田六十四萬井以為三分去一本於班固刑法志今考百萬井而去三十六萬井乃二十五分而去九班志本不云三分去一彤所引殊為誤記且班志非為周官作注故立算不必盡據經文今彤既據經文即當參校經義求其吻合考鄭載師注算近郊百里則用三分去一之法算六遂以外則用十八分去五之法蓋近郊以內不易之地家百畝一易之地家二百畝再易之地家三百畝相通三夫而受六夫之地至六遂以外上地家百畝菜百畝下地家百畝菜二百畝相通六夫而受十三夫之地其所受之田既較近郊為加多則所去之地即當較近郊為加少故郊內三分去一而遂外僅十八分去五也夫以三分去一算遂外之地且猶病其過多而况於二十五分而去九乎此不信鄭注之所以疏也至謂遂人十夫亦為井田乃襲宋人緒論尤無足置辨厯來考周禮為偽者不止一家惟官多田少之説猝難置辨得彤此書遂決千古之疑頗為有功於經典惟此數條乃其百慮之一失故附著之俾論者有所考焉乾隆四十二年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
